# Local dev hygiene: never leave a daemon running (it holds ~5 GB RAM idle
# on this project and has repeatedly OOM-killed VS Code + other apps).
# CI overrides this via GRADLE_OPTS when needed.
org.gradle.daemon = false
org.gradle.parallel = false
org.gradle.caching = true
org.gradle.jvmargs = -Xmx1g -XX:MaxMetaspaceSize=512m
kotlin.code.style = official
version = 1.0.0-dev.8
